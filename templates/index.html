<!DOCTYPE html>
<html>

<head>

<title>Energy Prediction Dashboard</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>Energy Consumption Prediction</h1>

<form action="/predict" method="post">

<label>Hour (0–24)</label>
<input type="number" name="hour" min="0" max="24" step="1" placeholder="0-24" required>

<label>Day of Week (0–7)</label>
<input type="number" name="day" min="0" max="7" step="1" placeholder="0-7" required>

<label>Month (0–12)</label>
<input type="number" name="month" min="0" max="12" step="1" placeholder="0-12" required>

<br><br>

<button type="submit">Predict</button>

</form>

<div class="result">

{{ prediction_text }}

</div>

</div>

</body>

</html>
